<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0b12"/>
      <stop offset="100%" stop-color="#14101f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>
  <rect width="800" height="400" fill="url(#dots)"/>
  <rect width="800" height="400" fill="url(#glow)"/>

  <g transform="translate(400,200)">
    <!-- flow connectors -->
    <path d="M-190,-40 C-120,-40 -110,0 -50,0" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.7"/>
    <path d="M-190,40 C-120,40 -110,0 -50,0" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.7"/>
    <path d="M50,0 C110,0 120,-45 190,-45" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.7"/>
    <path d="M50,0 C110,0 120,45 190,45" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.7"/>

    <!-- input nodes -->
    <circle cx="-190" cy="-40" r="20" fill="#0b0b12" stroke="url(#accentGrad)" stroke-width="3"/>
    <circle cx="-190" cy="40" r="20" fill="#0b0b12" stroke="url(#accentGrad)" stroke-width="3"/>

    <!-- output nodes -->
    <circle cx="190" cy="-45" r="20" fill="#0b0b12" stroke="url(#accentGrad)" stroke-width="3"/>
    <circle cx="190" cy="45" r="20" fill="#0b0b12" stroke="url(#accentGrad)" stroke-width="3"/>

    <!-- central agent node -->
    <circle r="46" fill="#0b0b12" stroke="url(#accentGrad)" stroke-width="4.5"/>
    <circle r="10" fill="url(#accentGrad)"/>
    <circle r="30" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
