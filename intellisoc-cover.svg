<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0b12"/>
      <stop offset="100%" stop-color="#0e1a1c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>
  <rect width="800" height="400" fill="url(#dots)"/>
  <rect width="800" height="400" fill="url(#glow)"/>

  <g transform="translate(400,200)">
    <!-- radar rings -->
    <circle r="120" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.10"/>
    <circle r="85" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.14"/>
    <circle r="50" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.18"/>

    <!-- event blips -->
    <circle cx="92" cy="-58" r="4" fill="#22d3ee" opacity="0.8"/>
    <circle cx="-100" cy="30" r="4" fill="#a78bfa" opacity="0.8"/>
    <circle cx="60" cy="88" r="3.5" fill="#ffffff" opacity="0.6"/>

    <!-- shield -->
    <path d="M0,-78 L58,-56 L58,-6 C58,42 30,74 0,88 C-30,74 -58,42 -58,-6 L-58,-56 Z"
          fill="#0b0b12" stroke="url(#accentGrad)" stroke-width="4"/>
    <!-- check mark -->
    <polyline points="-24,-4 -6,16 30,-30" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
