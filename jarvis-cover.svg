<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0b12"/>
      <stop offset="100%" stop-color="#101422"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad)"/>
  <rect width="800" height="400" fill="url(#dots)"/>
  <rect width="800" height="400" fill="url(#glow)"/>

  <g transform="translate(400,200)">
    <!-- concentric orb rings -->
    <circle r="110" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.08"/>
    <circle r="80" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.35"/>

    <!-- voice waveform bars -->
    <g>
      <line x1="-84" y1="-10" x2="-84" y2="10" stroke="#6ee0ea" stroke-width="7" stroke-linecap="round"/>
      <line x1="-56" y1="-26" x2="-56" y2="26" stroke="#6ee0ea" stroke-width="7" stroke-linecap="round"/>
      <line x1="-28" y1="-46" x2="-28" y2="46" stroke="#6ee0ea" stroke-width="7" stroke-linecap="round"/>
      <line x1="0" y1="-60" x2="0" y2="60" stroke="#6ee0ea" stroke-width="7" stroke-linecap="round"/>
      <line x1="28" y1="-38" x2="28" y2="38" stroke="#6ee0ea" stroke-width="7" stroke-linecap="round"/>
      <line x1="56" y1="-22" x2="56" y2="22" stroke="#6ee0ea" stroke-width="7" stroke-linecap="round"/>
      <line x1="84" y1="-8" x2="84" y2="8" stroke="#6ee0ea" stroke-width="7" stroke-linecap="round"/>
    </g>
  </g>
</svg>
